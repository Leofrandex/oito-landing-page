<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authority Banner Screenshot Maker</title>
    <!-- We use html2canvas to capture the DOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            background: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Dark background with checkerboard to preview transparency better */
        body {
            background-image:
                linear-gradient(45deg, #333 25%, transparent 25%),
                linear-gradient(-45deg, #333 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #333 75%),
                linear-gradient(-45deg, transparent 75%, #333 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        #container {
            width: 1200px;
            /* Adjust if needed */
            height: 800px;
            position: relative;
            margin: 20px;
            /* No background so it's transparent */
            background: transparent;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 60px;
            /* Space between rows */
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            /* Just for preview */
            border: 1px solid #444;
            /* Just for preview */
        }

        .row {
            display: flex;
            width: fit-content;
            gap: 130px;
            /* Space between logos */
            align-items: center;
            will-change: transform;
        }

        /* Define animations for rows */
        .move-right {
            animation: moveRight 30s linear infinite;
        }

        .move-left {
            animation: moveLeft 30s linear infinite;
        }

        @keyframes moveRight {
            0% {
                transform: translateX(-50%);
            }

            100% {
                transform: translateX(0%);
            }
        }

        @keyframes moveLeft {
            0% {
                transform: translateX(0%);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .logo-item {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 120px;
            height: 80px;
        }

        .logo-item img,
        .logo-item svg {
            width: 80px;
            height: 80px;
            /* Filter to recolor black icons to forest green if we use raw images, 
               but we will request forest green directly from CDN */
            object-fit: contain;
        }

        .text-logo {
            font-size: 48px;
            font-weight: 800;
            color: white;
            white-space: nowrap;
        }

        #downloadBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 30px;
            background: #004346;
            color: #004346;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, background 0.2s;
        }

        #downloadBtn:hover {
            background: #002a2c;
            transform: scale(1.05);
        }

        .desc {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 100;
        }

        .loading {
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div class="desc">
        <strong>Authority Banner Screenshot Maker</strong><br>
        5 Rows, Interlaced Directions.<br>
        Background: Transparent.<br>
        Color: #004346 (Hover state).<br><br>
        Click Download to freeze frame and save exact state.
    </div>

    <div id="container">
        <!-- Rows will be injected here -->
        <div id="loadingIndicator" class="loading">Loading Icons...</div>
    </div>

    <button id="downloadBtn" disabled>Loading...</button>

        };

        // Ensure 5 rows, approx 4 items each initially
        const rowsCount = 5;
        // Distribute logos into 5 chunks of ~4
        const chunked = [];
        let index = 0;
        for (let i = 0; i < rowsCount; i++) {
            const rowChunk = [];
            // Try to put 4 items in each row (last row may have remaining)
            const count = i < 4 ? 4 : brandNames.length - 16;
            for (let j = 0; j < 4; j++) {
                rowChunk.push(brandNames[index % brandNames.length]);
                index++;
            }
            chunked.push(rowChunk);
        }

        const container = document.getElementById('container');
        const colorHex = '228B22'; // Forrest Green

        async function init() {
            container.innerHTML = ''; // clear loading text

            for (let i = 0; i < rowsCount; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = `row ${i % 2 === 0 ? 'move-right' : 'move-left'}`;

                // For a seamless infinite scrolling, we duplicate the chunk multiple times
                // so the row is long enough to cover 200% width smoothly.
                // A row has 4 items. Let's repeat it 4 times so we have 16 items per row, 
                // creating enough width to scroll -50% smoothly.
                const repeatedChunk = [
                    ...chunked[i], ...chunked[i],
                    ...chunked[i], ...chunked[i],
                    ...chunked[i], ...chunked[i] // Extra safe
                ];

                for (const brand of repeatedChunk) {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'logo-item';

                    if (brand.type === 'text') {
                        itemDiv.innerHTML = `<span class="text-logo">${brand.text}</span>`;
                    } else {
                        // Use pre-rendered react-icons SVGs to ensure exact matching format and no CDN bugs
                        if (staticIcons[brand.slug]) {
                            itemDiv.innerHTML = staticIcons[brand.slug];
                        } else {
                            itemDiv.innerHTML = `<span class="text-logo" style="font-size:24px">${brand.slug}</span>`;
                        }
                    }
                    rowDiv.appendChild(itemDiv);
                }

                container.appendChild(rowDiv);
            }

            // Enable download
            const dBtn = document.getElementById('downloadBtn');
            dBtn.innerText = 'Download Transparent PNG';
            dBtn.disabled = false;
        }

        init();

        document.getElementById('downloadBtn').onclick = async () => {
            const btn = document.getElementById('downloadBtn');
            btn.innerText = 'Capturing...';
            btn.disabled = true;

            // Pause animations temporarily for precise capture
            const rows = document.querySelectorAll('.row');
            rows.forEach(r => {
                const computedStyle = window.getComputedStyle(r);
                r.style.transform = computedStyle.transform; // freeze at current matrix
                r.style.animation = 'none'; // disable animation
            });

            // html2canvas capture
            const canvas = await html2canvas(container, {
                backgroundColor: null, // explicit transparent background
                scale: 2, // High resolution
                logging: false,
                useCORS: true
            });

            // Resume animations
            rows.forEach(r => {
                r.style.transform = '';
                r.style.animation = '';
            });

            // Download
            const link = document.createElement('a');
            const timestamp = new Date().getTime();
            link.download = `authority_banner_${timestamp}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();

            btn.innerText = 'Download Transparent PNG';
            btn.disabled = false;
        };
    </script>
